<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Risk It All</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #ff6b9d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            transition: background 0.8s ease;
        }

        body.pink-solid {
            background: #ffb7c5 !important;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(255,182,193,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,182,193,0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255,105,180,0.2) 0%, transparent 50%);
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .container {
            text-align: center;
            max-width: 500px;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        .greeting {
            font-size: 2.5rem;
            font-weight: 700;
            color: #d63076;
            margin-bottom: 20px;
            animation: fadeInUp 1s ease-out;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .warning {
            font-size: 1.3rem;
            color: #c44569;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out 0.2s both;
            font-weight: 600;
            text-shadow: 1px 1px 8px rgba(0,0,0,0.3);
        }

        .btn-ready {
            background: linear-gradient(45deg, #d63076, #ff6b9d);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(214,48,118,0.5);
            transition: all 0.3s ease;
            animation: fadeInUp 1s ease-out 0.4s both;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: 52px;
            min-width: 200px;
        }

        .btn-ready:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(214,48,118,0.7);
        }

        .message-container {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .text-message {
            font-size: 1.8rem;
            color: #d63076;
            font-weight: 600;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            opacity: 0;
            transform: scale(0.8) translateY(10px);
        }

        .text-message.fade-in {
            opacity: 1;
            transform: scale(1) translateY(0);
            animation: fadeInMessage 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .text-message.fade-out {
            opacity: 0;
            transform: scale(0.8) translateY(-10px);
            animation: fadeOutMessage 0.5s cubic-bezier(0.55, 0.055, 0.675, 0.19) forwards;
        }

        @keyframes fadeInMessage {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(20px);
            }
            50% {
                opacity: 0.7;
                transform: scale(1.05) translateY(-5px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes fadeOutMessage {
            0% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
            100% {
                opacity: 0;
                transform: scale(0.8) translateY(-15px);
            }
        }

        .love-question {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            font-weight: 700;
            color: #c44569;
            margin: 40px 0;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.4);
            animation: heartBeat 1.5s ease-in-out;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }

        .choices {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
            min-height: 80px;
        }

        .btn-choice {
            padding: 8px 20px;
            font-size: 0.85rem;
            font-weight: 700;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 110px;
            min-height: 44px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 10;
            touch-action: manipulation;
        }

        .btn-yes {
            background: linear-gradient(45deg, #d63076, #ff6b9d);
            color: white;
            box-shadow: 0 8px 25px rgba(214,48,118,0.5);
        }

        .btn-yes:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(214,48,118,0.7);
        }

        .btn-no {
            background: linear-gradient(45deg, #34495e, #2c3e50);
            color: white;
            box-shadow: 0 8px 25px rgba(52,73,94,0.6);
            font-weight: 800;
            transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .btn-no:active {
            transform: scale(0.95);
        }

        .stage {
            display: none;
            animation: fadeIn 0.8s ease-out;
        }

        .stage.active {
            display: block;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .fade-out {
            animation: fadeOut 0.5s ease-out forwards;
        }

        @media (max-width: 768px) {
            .greeting {
                font-size: 2rem;
            }
            
            .warning {
                font-size: 1.1rem;
            }
            
            .love-question {
                font-size: 2.8rem;
            }
            
            .text-message {
                font-size: 1.3rem;
            }
            
            .choices {
                gap: 15px;
                flex-direction: row;
                justify-content: center;
            }
            
            .btn-choice {
                padding: 8px 18px;
                font-size: 0.8rem;
                min-width: 100px;
                min-height: 42px;
            }
            
            .btn-ready {
                padding: 12px 28px;
                font-size: 1.1rem;
                min-width: 180px;
                min-height: 52px;
            }
        }

        .heart {
            position: fixed;
            bottom: -50px;
            color: #ff1493;
            font-size: 20px;
            pointer-events: none;
            z-index: 999;
            animation: heartFloatUp 4s linear forwards;
        }

        @keyframes heartFloatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
                bottom: -50px;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
                bottom: 100vh;
            }
        }

        .yes-message-stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            background: transparent;
        }

        .yes-message-container {
            text-align: center;
            max-width: 500px;
            padding: 40px 20px;
        }

        .yes-text-message {
            font-size: 1.8rem;
            color: #d63076;
            font-weight: 600;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            opacity: 0;
            transform: scale(0.8) translateY(10px);
        }

        .yes-text-message.fade-in {
            opacity: 1;
            transform: scale(1) translateY(0);
            animation: fadeInMessage 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .yes-text-message.fade-out {
            opacity: 0;
            transform: scale(0.8) translateY(-10px);
            animation: fadeOutMessage 0.5s cubic-bezier(0.55, 0.055, 0.675, 0.19) forwards;
        }

        @media (max-width: 768px) {
            .yes-text-message {
                font-size: 1.3rem;
            }
        }

        .audio-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="stage1" class="stage active">
            <div class="greeting">👋 Halo Keisha 👋</div>
            <div class="warning">Jangan pencet tombol dibawah ini kalau belum siap</div>
            <button class="btn-ready" onclick="startMessages()">AYO UDAH SIAP</button>
        </div>

        <div id="stage2" class="stage">
            <div class="message-container">
                <div class="text-message" id="message1"></div>
            </div>
        </div>

        <div id="stage3" class="stage">
            <div class="love-question">Do you want to be my girlfriend? 💕</div>
            <div class="choices" id="choicesContainer">
                <button class="btn-choice btn-yes" onclick="yesClicked()">Yes, I do 💖</button>
                <button class="btn-choice btn-no" id="noBtn" onclick="noClicked()">No, leave me alone 😤</button>
            </div>
        </div>
    </div>


    <div class="audio-container">
        <audio id="bgMusic" loop preload="auto">
            <source src="music.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        let currentMessageIndex = 0;
        const messages = [
            "Okeh siap yaa...",
            "''Gaboleh gitu jadi cowo, harus tudep''",
            "Ashiapp, yaudah langsung tudep nihh"
        ];

        let yesMessageIndex = 0;
        const yesMessages = [
            "''Siapapun cowo lu nanti, lu hoki banget bro bisa dapetin keisha'' -Fadhil",
            "And now, I'm the luckiest guy in the world."
        ];

        let noButtonMoveCount = 0;
        const maxMoves = 5;
        let heartInterval;
        let audioPlaying = false;

        function startMusic() {
            const audio = document.getElementById('bgMusic');
            if (audio && !audioPlaying) {
                audio.volume = 0.5;
                audio.play().then(() => {
                    audioPlaying = true;
                }).catch((error) => {
                    console.log("Autoplay blocked, need user interaction");
                });
            }
        }

        function startMessages() {
            startMusic();
            
            document.getElementById('stage1').classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('stage1').style.display = 'none';
                document.getElementById('stage2').classList.add('active');
                showNextMessage();
            }, 500);
        }

        function showNextMessage() {
            const messageEl = document.getElementById('message1');
            
            if (currentMessageIndex < messages.length) {
                messageEl.textContent = messages[currentMessageIndex];
                messageEl.classList.remove('fade-out', 'fade-in');
                messageEl.classList.add('fade-in');
                
                currentMessageIndex++;
                
                if (currentMessageIndex < messages.length) {
                    setTimeout(() => {
                        messageEl.classList.remove('fade-in');
                        messageEl.classList.add('fade-out');
                        setTimeout(() => {
                            showNextMessage();
                        }, 500);
                    }, 2000);
                } else {
                    setTimeout(() => {
                        messageEl.classList.remove('fade-in');
                        messageEl.classList.add('fade-out');
                        setTimeout(() => {
                            goToLoveQuestion();
                        }, 500);
                    }, 2500);
                }
            }
        }

        function goToLoveQuestion() {
            document.getElementById('stage2').classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('stage2').style.display = 'none';
                document.getElementById('stage3').classList.add('active');
            }, 500);
        }

        function noClicked() {
            noButtonMoveCount++;
            const noBtn = document.getElementById('noBtn');
            const choicesContainer = document.getElementById('choicesContainer');
            
            const containerRect = choicesContainer.getBoundingClientRect();
            const btnRect = noBtn.getBoundingClientRect();
            const containerWidth = containerRect.width;
            const containerHeight = containerRect.height;
            
            const maxX = Math.max(0, containerWidth - btnRect.width - 20);
            const maxY = Math.max(0, containerHeight - btnRect.height - 20);
            
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;
            
            noBtn.style.transform = `translate(${randomX}px, ${randomY}px) rotate(${Math.random() * 20 - 10}deg) scale(0.95)`;
            
            setTimeout(() => {
                noBtn.style.transform = 'translate(0, 0) rotate(0deg) scale(1)';
            }, 250);
            
            if (noButtonMoveCount >= maxMoves) {
                noBtn.textContent = "MASIH NGGAK MAU? 😭";
                setTimeout(() => {
                    noBtn.textContent = "No, leave me alone 😤";
                }, 1000);
                noButtonMoveCount = 0;
            }
        }

        function createHeavyHearts() {
            if (heartInterval) clearInterval(heartInterval);
            
            for (let i = 0; i < 120; i++) {
                setTimeout(() => {
                    createHeart();
                }, i * 50);
            }
            
            let count = 0;
            const heavyHeartInterval = setInterval(() => {
                for (let i = 0; i < 4; i++) {
                    createHeart();
                }
                count++;
                if (count >= 66) {
                    clearInterval(heavyHeartInterval);
                    heartInterval = setInterval(createHeart, 1500);
                }
            }, 150);
        }

        function createHeart() {
            const heart = document.createElement('div');
            const heartSymbols = ['💕', '💖', '💗', '💓', '💝', '❤️', '💘', '💞'];
            heart.innerHTML = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.animationDelay = Math.random() * 1 + 's';
            document.body.appendChild(heart);
            setTimeout(() => {
                heart.remove();
            }, 8000);
        }

        function showFinalMessage() {
            const finalDiv = document.createElement('div');
            finalDiv.style.position = 'fixed';
            finalDiv.style.top = '0';
            finalDiv.style.left = '0';
            finalDiv.style.width = '100%';
            finalDiv.style.height = '100%';
            finalDiv.style.display = 'flex';
            finalDiv.style.justifyContent = 'center';
            finalDiv.style.alignItems = 'center';
            finalDiv.style.zIndex = '300';
            finalDiv.style.pointerEvents = 'none';
            
            const messageDiv = document.createElement('div');
            messageDiv.style.fontFamily = 'Playfair Display, cursive';
            messageDiv.style.fontSize = '1.8rem';
            messageDiv.style.fontWeight = '900';
            messageDiv.style.color = '#d63076';
            messageDiv.style.textShadow = '2px 2px 8px rgba(0,0,0,0.2)';
            messageDiv.style.textAlign = 'center';
            messageDiv.style.letterSpacing = '1px';
            messageDiv.style.whiteSpace = 'nowrap';
            messageDiv.textContent = 'YOU JUST MADE MY DAY!';
            messageDiv.style.animation = 'popIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards';
            
            finalDiv.appendChild(messageDiv);
            document.body.appendChild(finalDiv);
            
            setTimeout(() => {
                finalDiv.style.opacity = '0';
                finalDiv.style.transition = 'opacity 1s ease';
                setTimeout(() => {
                    finalDiv.remove();
                }, 1000);
            }, 4000);
        }

        function showYesMessageSequence() {
            const stageDiv = document.createElement('div');
            stageDiv.className = 'yes-message-stage';
            const containerDiv = document.createElement('div');
            containerDiv.className = 'yes-message-container';
            const messageDiv = document.createElement('div');
            messageDiv.className = 'yes-text-message';
            containerDiv.appendChild(messageDiv);
            stageDiv.appendChild(containerDiv);
            document.body.appendChild(stageDiv);
            
            function showNextYesMessage() {
                if (yesMessageIndex < yesMessages.length) {
                    messageDiv.textContent = yesMessages[yesMessageIndex];
                    messageDiv.classList.remove('fade-out', 'fade-in');
                    messageDiv.classList.add('fade-in');
                    
                    yesMessageIndex++;
                    
                    if (yesMessageIndex < yesMessages.length) {
                        setTimeout(() => {
                            messageDiv.classList.remove('fade-in');
                            messageDiv.classList.add('fade-out');
                            setTimeout(() => {
                                showNextYesMessage();
                            }, 500);
                        }, 6000);
                    } else {
                        setTimeout(() => {
                            messageDiv.classList.remove('fade-in');
                            messageDiv.classList.add('fade-out');
                            setTimeout(() => {
                                stageDiv.remove();
                                startCelebration();
                            }, 500);
                        }, 6000);
                    }
                }
            }
            
            showNextYesMessage();
        }

        function startCelebration() {
            createHeavyHearts();
            showFinalMessage();
        }

        async function yesClicked() {
            const yesBtn = document.querySelector('.btn-yes');
            const noBtn = document.getElementById('noBtn');
            const choicesContainer = document.getElementById('choicesContainer');
            const loveQuestion = document.querySelector('.love-question');
            
            yesBtn.style.pointerEvents = 'none';
            noBtn.style.pointerEvents = 'none';
            
            loveQuestion.style.animation = 'none';
            loveQuestion.style.transition = 'opacity 0.5s ease';
            loveQuestion.style.opacity = '0';
            choicesContainer.style.transition = 'opacity 0.5s ease';
            choicesContainer.style.opacity = '0';
            
            document.body.classList.add('pink-solid');
            
            setTimeout(() => {
                document.getElementById('stage3').style.display = 'none';
                showYesMessageSequence();
            }, 500);
        }

        const noBtn = document.getElementById('noBtn');
        noBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
        });
        
        noBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            e.stopPropagation();
            noClicked();
        });

        heartInterval = setInterval(createHeart, 2000);

        const style = document.createElement('style');
        style.textContent = `
            @keyframes popIn {
                0% {
                    transform: scale(0) rotate(-10deg);
                    opacity: 0;
                }
                50% {
                    transform: scale(1.2) rotate(2deg);
                }
                100% {
                    transform: scale(1) rotate(0deg);
                    opacity: 1;
                }
            }
        `;
        document.head.appendChild(style);
        
        window.addEventListener('load', function() {
            const audio = document.getElementById('bgMusic');
            if (audio) {
                audio.volume = 0.5;
                audio.play().catch(() => {
                    console.log("Autoplay blocked - music will start when user clicks button");
                });
            }
        });
    </script>
</body>
</html>
